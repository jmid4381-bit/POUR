<svg width="100%" height="100%" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg" role="img">
<title>San Pellegrino — festive 4th of July styled beverage card</title>
<desc>Stylized illustration of San Pellegrino, lit by a warm pale-gold spotlight behind the glass fading into red and blue glow accents at the corners, against a deep navy background, framed by a red-white-blue gradient border.</desc>
<defs>
<linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#0a0e1a"/>
<stop offset="1" stop-color="#040507"/>
</linearGradient>
<linearGradient id="patrioticBand" x1="0" y1="0" x2="1" y2="0">
<stop offset="0" stop-color="#c0273a" stop-opacity="0.6"/>
<stop offset="0.5" stop-color="#fff4d6" stop-opacity="0.12"/>
<stop offset="1" stop-color="#2451d6" stop-opacity="0.55"/>
</linearGradient>
<linearGradient id="frameGrad" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#c0273a"/>
<stop offset="0.5" stop-color="#f4f4f4"/>
<stop offset="1" stop-color="#2451d6"/>
</linearGradient>
<radialGradient id="spot" cx="0.5" cy="0.45" r="0.62">
<stop offset="0" stop-color="#fff4d6" stop-opacity="0.65"/>
<stop offset="0.35" stop-color="#ffdfa3" stop-opacity="0.32"/>
<stop offset="0.7" stop-color="#ffdfa3" stop-opacity="0.08"/>
<stop offset="1" stop-color="#ffdfa3" stop-opacity="0"/>
</radialGradient></defs>
<rect x="0" y="0" width="680" height="680" fill="url(#bgGrad)"/>
<rect x="0" y="0" width="680" height="680" fill="url(#patrioticBand)"/>
<rect x="0" y="0" width="680" height="680" fill="url(#spot)"/>
<g transform="translate(-133.42,-24.81) scale(1.3924)"><rect x="305" y="150" width="70" height="270" rx="18" fill="#0a1418" opacity="0.45"/>
<rect x="313" y="190" width="54" height="222" rx="16" fill="#bfe0ea"/>
<circle cx="332" cy="310" r="2.2" fill="#eaf6ff" opacity="0.8"/>
<circle cx="346" cy="280" r="1.8" fill="#eaf6ff" opacity="0.7"/>
<circle cx="338" cy="240" r="1.6" fill="#eaf6ff" opacity="0.7"/>
<circle cx="352" cy="300" r="1.6" fill="#eaf6ff" opacity="0.7"/>
<circle cx="330" cy="265" r="1.4" fill="#eaf6ff" opacity="0.6"/>
