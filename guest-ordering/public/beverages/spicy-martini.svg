<svg width="100%" height="100%" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Spicy Martini — festive 4th of July styled beverage card</title>
<desc>Stylized illustration of Spicy Martini, lit by a warm pale-gold spotlight behind the glass fading into red and blue glow accents at the corners, against a deep navy background, framed by a red-white-blue gradient border.</desc>
<defs>
<linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#0a0e1a"/>
<stop offset="1" stop-color="#040507"/>
</linearGradient>
<linearGradient id="patrioticBand" x1="0" y1="0" x2="1" y2="0">
<stop offset="0" stop-color="#c0273a" stop-opacity="0.6"/>
<stop offset="0.5" stop-color="#fff4d6" stop-opacity="0.12"/>
<stop offset="1" stop-color="#2451d6" stop-opacity="0.55"/>
</linearGradient>
<linearGradient id="frameGrad" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#c0273a"/>
<stop offset="0.5" stop-color="#f4f4f4"/>
<stop offset="1" stop-color="#2451d6"/>
</linearGradient>
<radialGradient id="spot" cx="0.5" cy="0.45" r="0.62">
<stop offset="0" stop-color="#fff4d6" stop-opacity="0.65"/>
<stop offset="0.35" stop-color="#ffdfa3" stop-opacity="0.32"/>
<stop offset="0.7" stop-color="#ffdfa3" stop-opacity="0.08"/>
<stop offset="1" stop-color="#ffdfa3" stop-opacity="0"/>
</radialGradient></defs>
<rect x="0" y="0" width="680" height="680" fill="url(#bgGrad)"/>
<rect x="0" y="140" width="680" height="400" fill="url(#patrioticBand)"/>
<rect x="0" y="0" width="680" height="680" fill="url(#spot)"/>
<path d="M255 255 L425 255 L348 415 L332 415 Z" fill="#160b06" opacity="0.92"/>
<path d="M268 262 L412 262 L344 400 L336 400 Z" fill="#9fb83a"/>
<ellipse cx="340" cy="270" rx="72" ry="10" fill="#9fb83a" opacity="0.55"/>
<rect x="336" y="415" width="8" height="62" fill="#26160c"/>
<ellipse cx="340" cy="480" rx="58" ry="11" fill="#1a0f08"/>
<circle cx="380" cy="268" r="13" fill="#7a9c2a" opacity="0.9"/>
<circle cx="380" cy="268" r="13" fill="none" stroke="#fff" stroke-opacity="0.4" stroke-width="1"/>
<line x1="380" y1="255" x2="380" y2="281" stroke="#fff" stroke-opacity="0.3" stroke-width="1"/>
<line x1="367" y1="268" x2="393" y2="268" stroke="#fff" stroke-opacity="0.3" stroke-width="1"/>

