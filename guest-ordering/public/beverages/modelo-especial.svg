<svg width="100%" height="100%" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Modelo Especial — festive 4th of July styled beverage card</title>
<desc>Stylized illustration of Modelo Especial, lit by a warm pale-gold spotlight behind the glass fading into red and blue glow accents at the corners, against a deep navy background, framed by a red-white-blue gradient border.</desc>
<defs>
<linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#0a0e1a"/>
<stop offset="1" stop-color="#040507"/>
</linearGradient>
<linearGradient id="patrioticBand" x1="0" y1="0" x2="1" y2="0">
<stop offset="0" stop-color="#c0273a" stop-opacity="0.6"/>
<stop offset="0.5" stop-color="#fff4d6" stop-opacity="0.12"/>
<stop offset="1" stop-color="#2451d6" stop-opacity="0.55"/>
</linearGradient>
<linearGradient id="frameGrad" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#c0273a"/>
<stop offset="0.5" stop-color="#f4f4f4"/>
<stop offset="1" stop-color="#2451d6"/>
</linearGradient>
<radialGradient id="spot" cx="0.5" cy="0.45" r="0.62">
<stop offset="0" stop-color="#fff4d6" stop-opacity="0.65"/>
<stop offset="0.35" stop-color="#ffdfa3" stop-opacity="0.32"/>
<stop offset="0.7" stop-color="#ffdfa3" stop-opacity="0.08"/>
<stop offset="1" stop-color="#ffdfa3" stop-opacity="0"/>
</radialGradient></defs>
<rect x="0" y="0" width="680" height="680" fill="url(#bgGrad)"/>
<rect x="0" y="0" width="680" height="680" fill="url(#patrioticBand)"/>
<rect x="0" y="0" width="680" height="680" fill="url(#spot)"/>
<g transform="translate(172.62,208.31) scale(0.4923)"><rect x="300" y="160" width="80" height="270" rx="16" fill="#0c1410" opacity="0.5"/>
<rect x="308" y="200" width="64" height="220" rx="14" fill="#d9a431"/>
<rect x="318" y="120" width="44" height="50" fill="#0c1410" opacity="0.6"/>
<rect x="314" y="105" width="52" height="22" rx="6" fill="#caa84a"/>
<rect x="300" y="290" width="80" height="60" fill="#caa84a"/>
<circle cx="330" cy="270" r="2.4" fill="#fff" opacity="0.5"/>
<circle cx="352" cy="240" r="2" fill="#fff" opacity="0.45"/>
</g>

<rect x="4" y="4" width="672" height="672" rx="6" fill="none" stroke="url(#frameGrad)" stroke-width="8"/>
<rect x="16" y="16" width="648" height="648" rx="4" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1.5"/>
