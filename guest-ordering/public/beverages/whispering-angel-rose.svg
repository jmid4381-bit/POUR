<svg width="100%" height="100%" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Whispering Angel Rosé — festive 4th of July styled beverage card</title>
<desc>Stylized illustration of Whispering Angel Rosé, lit by a warm pale-gold spotlight behind the glass fading into red and blue glow accents at the corners, against a deep navy background, framed by a red-white-blue gradient border.</desc>
