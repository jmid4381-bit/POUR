<title>Dom Pérignon 2015 — festive 4th of July styled beverage card</title>
<desc>Stylized illustration of Dom Pérignon 2015, lit by a warm pale-gold spotlight behind the glass fading into red and blue glow accents at the corners, against a deep navy background, framed by a red-white-blue gradient border.</desc>
